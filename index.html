<!DOCTYPE html>
<html>
<head>
    <title>Wxm-233的主页</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-areas:
                "header header"
                "nav nav"
                "main aside"
                "footer footer";
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        header, nav, main, aside, footer {
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav, footer {
            grid-column: 1 / -1;
        }

        nav a {
            margin-right: 15px;
        }

        aside {
            grid-area: aside;
        }

        main {
            grid-area: main;
        }

        header {
            grid-area: header;
        }

        footer {
            grid-area: footer;
        }
    </style>
</head>
<body>
    <nav>
        <a href="./index.html">主页</a>
    </nav>
    <h1>Wxm-233's github page</h1>

</body>
</html>
